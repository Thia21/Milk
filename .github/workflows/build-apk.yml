name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22   # @capacitor/cli@8 requires Node >=22; Node 20 crashes `cap sync`
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21   # AGP 8.13 + Gradle 8.14.3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyB0IXOyEsCtktL4587isKIdQIr2oX6E9mQ"
          VITE_FIREBASE_AUTH_DOMAIN: "sekar-milk.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "sekar-milk"
          VITE_FIREBASE_STORAGE_BUCKET: "sekar-milk.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "304498382789"
          VITE_FIREBASE_APP_ID: "1:304498382789:web:e6f7b442bc27f03eecddac"
          VITE_FIREBASE_MEASUREMENT_ID: "G-QS1B5N56CN"

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk SekarMilk.apk

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "SekarMilk.apk"
          tag: "latest"
          name: "Sekar Milk — Latest APK"
          body: |
            ## Install on Android

            1. Open this page on your Android phone
            2. Tap **SekarMilk.apk** to download
            3. When asked, allow installing from unknown sources
            4. Tap Install — done!

            > Connected to Firebase — data syncs across all devices.
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
