name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk SekarMilk.apk

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "SekarMilk.apk"
          tag: "latest"
          name: "Sekar Milk — Latest APK"
          body: |
            ## Install on Android

            1. Open this page on your Android phone
            2. Tap **SekarMilk.apk** to download
            3. When asked, allow installing from unknown sources
            4. Tap Install — done!

            > Works fully offline after install. All data stored on the device.
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
